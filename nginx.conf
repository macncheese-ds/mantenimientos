# =============================================================================
# Nginx config for Machine Maintenance Tracker
# Frontend: port 3214, Backend API: port 3114
# Server: 10.229.31.220
# =============================================================================

server {
    listen 3214;
    server_name _;

    root /path/to/mantenimientos/frontend/dist;
    index index.html;

    # ── Static assets: cache aggressively (hashed filenames) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy to backend ──
    location /api/ {
        proxy_pass http://10.229.31.220:3114;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10M;
    }

    # ── Uploaded photos proxy ──
    location /uploads/ {
        proxy_pass http://10.229.31.220:3114;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── SPA fallback: all routes go to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
